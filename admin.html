<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Pekerja Lepas</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ADMIN-SPECIFIC OVERRIDES */
    .app-header { background: linear-gradient(135deg, #0C3060 0%, #0C447C 60%, #1a6fca 100%); }

    .role-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 99px;
    }
    .badge-admin { background: #FFF0D9; color: #A05A00; }
    .badge-user  { background: var(--blue-light); color: var(--blue-dark); }

    .user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
      margin-bottom: 1.5rem;
    }
    .user-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 14px;
    }
    .user-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 14px; font-weight: 600; color: var(--gray-800); margin-bottom: 3px; }
    .user-uname { font-size: 12px; color: var(--gray-400); font-family: var(--font-mono); }
    .user-actions { display: flex; gap: 6px; }
    .btn-icon {
      width: 30px; height: 30px;
      border-radius: 7px; border: 1px solid var(--gray-200);
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-icon svg { width: 14px; height: 14px; }
    .btn-icon:hover { border-color: var(--blue); color: var(--blue); }
    .btn-icon.danger:hover { border-color: #F09595; color: #A32D2D; background: #FCEBEB; }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 28px 32px;
      width: 100%; max-width: 400px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.15);
      margin: 20px;
    }
    .modal-title {
      font-size: 16px; font-weight: 700; color: var(--blue-dark);
      margin-bottom: 20px; padding-bottom: 14px;
      border-bottom: 1px solid var(--gray-100);
    }
    .modal-footer { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .btn-cancel {
      padding: 9px 20px;
      background: var(--white); color: var(--gray-600);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: var(--gray-400); }

    .header-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
    .session-info { text-align: right; }
    .session-name { font-size: 13px; font-weight: 600; color: #fff; }
    .session-role { font-size: 11px; color: rgba(255,255,255,0.6); }
    .btn-logout {
      padding: 7px 14px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: var(--radius-sm);
      color: #fff; font-family: var(--font-body);
      font-size: 12.5px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-logout svg { width: 14px; height: 14px; }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    select {
      width: 100%;
      padding: 9px 12px 9px 38px;
      border: 1px solid var(--gray-200);
      border-radius: 9px;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--gray-800);
      background: var(--gray-50);
      outline: none;
      appearance: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--blue); background: var(--white); box-shadow: 0 0 0 3px rgba(26,111,202,0.1); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-inner">
      <div class="app-logo">
        <svg viewBox="0 0 28 28" fill="none">
          <rect x="4" y="7" width="20" height="16" rx="3" stroke="white" stroke-width="1.8"/>
          <path d="M9 7V6a5 5 0 0110 0v1" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M9 14h10M9 18h6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="app-title">Pekerja Lepas</h1>
        <p class="app-subtitle">Panel Administrator</p>
      </div>
      <div class="header-right">
        <div class="session-info">
          <div class="session-name" id="session-name">-</div>
          <div class="session-role">Administrator</div>
        </div>
        <button class="btn-logout" onclick="logout()">
          <svg viewBox="0 0 16 16" fill="none"><path d="M6 14H3a1 1 0 01-1-1V3a1 1 0 011-1h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Keluar
        </button>
      </div>
    </div>
  </header>

  <!-- NAV -->
  <nav class="main-nav">
    <div class="nav-inner">
      <button class="nav-btn active" onclick="showPage('dashboard')">
        <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        Dashboard
      </button>
      <button class="nav-btn" onclick="showPage('kelola-user')">
        <svg viewBox="0 0 18 18" fill="none"><circle cx="7" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 15c0-2.8 2.2-5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M13 10v6M10 13h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Kelola User
      </button>
      <button class="nav-btn" onclick="showPage('semua-pekerjaan')">
        <svg viewBox="0 0 18 18" fill="none"><rect x="3" y="2" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 6h6M6 9h6M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Semua Pekerjaan
      </button>
    </div>
  </nav>

  <main class="main-content">

    <!-- ==================== DASHBOARD ADMIN ==================== -->
    <section id="dashboard" class="page active">
      <div class="stat-grid" id="admin-stat-grid"></div>
      <div class="sec-title">Aktivitas Terbaru (Semua User)</div>
      <div class="table-card">
        <table>
          <thead><tr>
            <th style="width:25%">Nama Pekerjaan</th>
            <th style="width:18%">User</th>
            <th style="width:22%">Tanggal</th>
            <th style="width:18%">Durasi</th>
            <th style="width:17%">Status</th>
          </tr></thead>
          <tbody id="admin-recent-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- ==================== KELOLA USER ==================== -->
    <section id="kelola-user" class="page">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem">
        <div class="sec-title" style="padding:0;border:none;margin:0">Daftar User</div>
        <button class="btn-primary" onclick="openAddUser()" style="padding:8px 18px;font-size:13.5px">
          <svg viewBox="0 0 16 16" fill="none" style="width:14px;height:14px"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Tambah User
        </button>
      </div>
      <div class="user-grid" id="user-grid"></div>
    </section>

    <!-- ==================== SEMUA PEKERJAAN ==================== -->
    <section id="semua-pekerjaan" class="page">
      <div class="filter-row" id="admin-filter-row"></div>
      <div class="table-card">
        <table>
          <thead><tr>
            <th style="width:28%">Nama Pekerjaan</th>
            <th style="width:17%">User</th>
            <th style="width:23%">Tanggal</th>
            <th style="width:17%">Durasi</th>
            <th style="width:15%">Aksi</th>
          </tr></thead>
          <tbody id="all-jobs-tbody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- MODAL TAMBAH / EDIT USER -->
  <div class="modal-overlay" id="modal-user">
    <div class="modal">
      <div class="modal-title" id="modal-user-title">Tambah User Baru</div>
      <div class="form-group">
        <label>Nama Lengkap</label>
        <div class="input-wrap">
          <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="text" id="modal-nama" placeholder="Nama lengkap user">
        </div>
      </div>
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M9 6v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="text" id="modal-username" placeholder="Username unik">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 18 18" fill="none"><rect x="4" y="8" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 8V6a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="password" id="modal-password" placeholder="Password">
        </div>
      </div>
      <div class="form-group">
        <label>Role</label>
        <div class="input-wrap">
          <svg viewBox="0 0 18 18" fill="none"><path d="M9 2l1.5 4H15l-3.5 2.5 1.3 4L9 10l-3.8 2.5 1.3-4L3 6h4.5L9 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <select id="modal-role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('modal-user')">Batal</button>
        <button class="btn-primary" onclick="saveUser()" style="padding:9px 20px;font-size:14px">Simpan</button>
      </div>
    </div>
  </div>

  <!-- MODAL KONFIRMASI HAPUS -->
  <div class="modal-overlay" id="modal-delete">
    <div class="modal">
      <div class="modal-title">Hapus User?</div>
      <p style="font-size:14px;color:var(--gray-600);line-height:1.6">User <strong id="delete-target-name"></strong> akan dihapus beserta semua data pekerjaannya. Tindakan ini tidak bisa dibatalkan.</p>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('modal-delete')">Batal</button>
        <button class="btn-primary" onclick="confirmDelete()" style="padding:9px 20px;font-size:14px;background:linear-gradient(135deg,#A32D2D,#C94040)">Ya, Hapus</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
// ==================== SESSION CHECK ====================
const session = JSON.parse(sessionStorage.getItem('pl_session') || 'null');
if (!session || session.role !== 'admin') window.location.href = 'login.html';
document.getElementById('session-name').textContent = session ? session.nama : '-';

let users = [], allJobs = [], jobFilterUser = 'all', editUserId = null, deleteTargetId = null;

const BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const fmtSec = s => { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60; return [h,m,sc].map(v=>String(v).padStart(2,'0')).join(':'); };
const fmtTgl = t => { const d=new Date(t); return `${d.getDate()} ${BULAN[d.getMonth()]} ${d.getFullYear()}`; };
const getUserName = uid => { const u=users.find(u=>String(u.id)===String(uid)); return u?u.nama:'Unknown'; };
const initials = nama => nama.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const showLoad = (id,c) => document.getElementById(id).innerHTML=`<tr><td colspan="${c}" class="empty">Memuat data...</td></tr>`;

function showPage(p) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['dashboard','kelola-user','semua-pekerjaan'][i]===p));
  document.getElementById(p).classList.add('active');
  if(p==='dashboard')     renderAdminDash();
  if(p==='kelola-user')   loadUsers();
  if(p==='semua-pekerjaan')loadAllJobs();
}

async function renderAdminDash() {
  showLoad('admin-recent-tbody',5);
  try {
    const [rU,rJ] = await Promise.all([API.getUsers(session.id), API.getAllJobs(session.id)]);
    users=rU.success?rU.data:[]; allJobs=rJ.success?rJ.data:[];
    const totalSec=allJobs.reduce((a,b)=>a+b.durasi,0);
    const today=new Date().toISOString().slice(0,10);
    document.getElementById('admin-stat-grid').innerHTML=`
      <div class="stat"><div class="stat-label">Total User</div><div class="stat-val">${users.filter(u=>u.role==='user').length}</div></div>
      <div class="stat"><div class="stat-label">Total Pekerjaan</div><div class="stat-val">${allJobs.length}</div></div>
      <div class="stat"><div class="stat-label">Total Durasi</div><div class="stat-val" style="font-size:18px">${fmtSec(totalSec)}</div></div>
      <div class="stat"><div class="stat-label">Hari Ini</div><div class="stat-val">${allJobs.filter(j=>j.tgl===today).length}</div></div>`;
    const tbody=document.getElementById('admin-recent-tbody');
    tbody.innerHTML=allJobs.length
      ?allJobs.slice(0,10).map(j=>`<tr><td title="${j.nama}">${j.nama}</td><td>${getUserName(j.userId)}</td><td>${fmtTgl(j.tgl)}</td><td>${fmtSec(j.durasi)}</td><td><span class="badge badge-done">selesai</span></td></tr>`).join('')
      :`<tr><td colspan="5" class="empty">Belum ada aktivitas</td></tr>`;
  } catch(err) {
    document.getElementById('admin-recent-tbody').innerHTML=`<tr><td colspan="5" class="empty">Gagal: ${err.message}</td></tr>`;
  }
}

async function loadUsers() {
  document.getElementById('user-grid').innerHTML=`<div style="color:var(--gray-400);font-size:13px;padding:1rem">Memuat...</div>`;
  try { const r=await API.getUsers(session.id); users=r.success?r.data:[]; renderUsers(); }
  catch(err) { document.getElementById('user-grid').innerHTML=`<div class="empty">Gagal: ${err.message}</div>`; }
}
function renderUsers() {
  document.getElementById('user-grid').innerHTML=users.map(u=>`
    <div class="user-card">
      <div class="user-avatar">${initials(u.nama)}</div>
      <div class="user-info">
        <div class="user-name">${u.nama}</div>
        <div class="user-uname">@${u.username}</div>
        <span class="role-badge ${u.role==='admin'?'badge-admin':'badge-user'}" style="margin-top:5px">${u.role==='admin'?'Admin':'User'}</span>
      </div>
      <div class="user-actions">
        ${String(u.id)!==String(session.id)?`
          <button class="btn-icon" onclick="openEditUser('${u.id}')" title="Edit"><svg viewBox="0 0 16 16" fill="none"><path d="M11 2l3 3-8 8H3v-3l8-8z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg></button>
          <button class="btn-icon danger" onclick="openDelete('${u.id}','${u.nama}')" title="Hapus"><svg viewBox="0 0 16 16" fill="none"><path d="M3 5h10M6 5V3h4v2M6 8v5M10 8v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
        `:'<span style="font-size:11px;color:var(--gray-400)">Saya</span>'}
      </div>
    </div>`).join('');
}
function openAddUser(){
  editUserId=null;
  document.getElementById('modal-user-title').textContent='Tambah User Baru';
  ['modal-nama','modal-username','modal-password'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-role').value='user';
  document.getElementById('modal-user').classList.add('show');
}
function openEditUser(id){
  const u=users.find(u=>String(u.id)===String(id)); if(!u)return;
  editUserId=id;
  document.getElementById('modal-user-title').textContent='Edit User';
  document.getElementById('modal-nama').value=u.nama;
  document.getElementById('modal-username').value=u.username;
  document.getElementById('modal-password').value='';
  document.getElementById('modal-role').value=u.role;
  document.getElementById('modal-user').classList.add('show');
}
async function saveUser(){
  const nama=document.getElementById('modal-nama').value.trim();
  const username=document.getElementById('modal-username').value.trim();
  const password=document.getElementById('modal-password').value;
  const role=document.getElementById('modal-role').value;
  if(!nama||!username){alert('Nama dan username wajib diisi.');return;}
  try{
    const res=editUserId
      ?await API.updateUser(session.id,{id:editUserId,nama,username,password:password||undefined,role})
      :await API.createUser(session.id,{nama,username,password,role});
    if(!res.success){alert('Gagal: '+res.error);return;}
    closeModal('modal-user'); loadUsers();
  }catch(err){alert('Error: '+err.message);}
}
function openDelete(id,nama){
  deleteTargetId=id;
  document.getElementById('delete-target-name').textContent=nama;
  document.getElementById('modal-delete').classList.add('show');
}
async function confirmDelete(){
  try{
    const res=await API.deleteUser(session.id,deleteTargetId);
    if(!res.success){alert('Gagal: '+res.error);return;}
    closeModal('modal-delete'); loadUsers();
  }catch(err){alert('Error: '+err.message);}
}

async function loadAllJobs(){
  showLoad('all-jobs-tbody',5);
  try{
    const [rJ,rU]=await Promise.all([API.getAllJobs(session.id),API.getUsers(session.id)]);
    allJobs=rJ.success?rJ.data:[]; users=rU.success?rU.data:[]; renderAllJobs();
  }catch(err){document.getElementById('all-jobs-tbody').innerHTML=`<tr><td colspan="5" class="empty">Gagal: ${err.message}</td></tr>`;}
}
function renderAllJobs(){
  const uo=users.filter(u=>u.role==='user');
  let fr=`<button class="fbtn ${jobFilterUser==='all'?'active':''}" onclick="setJobFilter('all')">Semua User</button>`;
  uo.forEach(u=>{fr+=`<button class="fbtn ${jobFilterUser==u.id?'active':''}" onclick="setJobFilter('${u.id}')">${u.nama}</button>`;});
  document.getElementById('admin-filter-row').innerHTML=fr;
  const fl=jobFilterUser==='all'?allJobs:allJobs.filter(j=>String(j.userId)===String(jobFilterUser));
  document.getElementById('all-jobs-tbody').innerHTML=fl.length
    ?fl.map(j=>`<tr><td title="${j.nama}">${j.nama}</td><td>${getUserName(j.userId)}</td><td>${fmtTgl(j.tgl)}</td><td>${fmtSec(j.durasi)}</td><td><button class="btn-icon danger" onclick="deleteJobAdmin('${j.id}')"><svg viewBox="0 0 16 16" fill="none"><path d="M3 5h10M6 5V3h4v2M6 8v5M10 8v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button></td></tr>`).join('')
    :`<tr><td colspan="5" class="empty">Belum ada data</td></tr>`;
}
function setJobFilter(v){jobFilterUser=v;renderAllJobs();}
async function deleteJobAdmin(id){
  if(!confirm('Hapus pekerjaan ini?'))return;
  try{const res=await API.deleteJob(session.id,id);if(!res.success){alert('Gagal: '+res.error);return;}loadAllJobs();}
  catch(err){alert('Error: '+err.message);}
}

function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});});
function logout(){sessionStorage.removeItem('pl_session');window.location.href='login.html';}

renderAdminDash();
  </script>
</body>
</html>
